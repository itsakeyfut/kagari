name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["T-Feat"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please provide enough information to help us evaluate and prioritize it.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A concise description of the feature in 1-2 sentences.
      placeholder: Add a scrollable list widget with virtualization to kagari-widgets.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? Who benefits from it?
      placeholder: |
        I'm building a video editor timeline that renders thousands of clips.
        Without virtualization the layout pass becomes the frame-time bottleneck.

        Target user: video editing / game engine UI developers
    validations:
      required: true

  - type: textarea
    id: detailed_description
    attributes:
      label: Detailed Description
      description: Describe the desired behavior, API shape, and any edge cases to consider.
      placeholder: |
        A virtualized list that only builds and lays out the visible rows:
        - Driven by the kagari-layout scroll/virtualization support
        - Reactive: re-renders only the rows whose data changed (damage-driven)
        - Works with variable-height rows

        ```rust
        let list = List::new(items)
            .row_height(RowHeight::Variable)
            .render_row(|item| /* element */);
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches have you tried or considered?
      placeholder: |
        - Building all rows eagerly: works but blows the layout/frame budget
        - Manual windowing in user code: error-prone and not reusable

  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to docs, related issues, or prior art.
      placeholder: |
        - docs/specs/layout.md (scroll / virtualization)
        - Related issue: #45
        - Prior art: gpui uniform_list, egui ScrollArea::show_rows
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Low - Nice to have
        - Medium - Would improve my workflow
        - High - Blocking my use case
      default: 0
    validations:
      required: true

  - type: dropdown
    id: target_crate
    attributes:
      label: Target Crate
      description: Which crate should this feature be added to?
      options:
        - kagari-base
        - kagari-render
        - kagari-style
        - kagari-layout
        - kagari-text
        - kagari-core
        - kagari-widgets
        - kagari (facade)
        - New crate
        - Unknown
      default: 9

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to help implement this feature
          required: false
        - label: I can provide test cases or example code
          required: false
        - label: I can help with documentation
          required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have checked the roadmap to see if this is already planned
          required: false
        - label: This feature aligns with the project's goals (a GPU UI crate for video editor and game engine UIs)
          required: false
